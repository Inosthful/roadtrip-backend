version: '3.8'

# Stack complète : postgres + backend + frontend + pgadmin
# Prérequis : roadTripCollab_front/ doit être cloné dans le même dossier parent que roadTripCollab_back/
#
# Usage :
#   docker-compose -f docker-compose.full.yml up --build

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: roadtrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: roadtrip
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d roadtrip"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API AdonisJS
  backend:
    build: .
    container_name: roadtrip-backend
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: 0.0.0.0
      DB_HOST: postgres
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend Vue / Vite
  frontend:
    build: ../roadTripCollab_front
    container_name: roadtrip-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../roadTripCollab_front:/app
      - /app/node_modules
    depends_on:
      - backend

  # pgAdmin — interface web PostgreSQL (optionnel)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: roadtrip-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@roadtrip.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
